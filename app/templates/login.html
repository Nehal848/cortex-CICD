<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Cortex CI/CD</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='1.0.1') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="logo">
      <a href="{{ url_for('main.index') }}" style="display: flex; align-items: center; gap: 0.6rem;">
        <i class="fa-solid fa-microchip"></i>
        Cortex CI/CD
      </a>
    </div>
    <ul class="nav-links">
      <li><a href="{{ url_for('main.index') }}" class="nav-item">Back to Home</a></li>
    </ul>
  </nav>

  <!-- Login Card Container -->
  <div class="auth-container">
    <div class="auth-card glass-panel">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Access the Self-Healing pipeline control deck</p>
      </div>

      {% if error %}
      <div class="auth-error">
        <i class="fa-solid fa-triangle-exclamation"></i>
        {{ error }}
      </div>
      {% endif %}

      <form action="{{ url_for('main.login') }}" method="POST">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          <i class="fa-solid fa-right-to-bracket"></i>
          Authenticate
        </button>
      </form>

      <div class="text-center mt-4" style="font-size: 0.85rem; color: var(--text-secondary);">
        <p><i class="fa-solid fa-circle-info" style="color: var(--accent-blue);"></i> Hint: Use username <strong>admin</strong> and password <strong>admin</strong></p>
      </div>
    </div>
  </div>

</body>
</html>
